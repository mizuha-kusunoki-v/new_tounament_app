# Render Blueprint - https://render.com/docs/blueprint-spec
#
# Deploys:
#   - new-tounament-db        Managed Postgres
#   - new-tounament-backend   FastAPI (runs Alembic migrations on every deploy)
#   - new-tounament-frontend  Next.js
#
# NEXT_PUBLIC_API_BASE_URL and ALLOWED_ORIGINS below are hardcoded to each
# other's default onrender.com URL (predictable from the "name" fields here).
# If you rename either service in the Render dashboard, update both values
# and manually redeploy the frontend (NEXT_PUBLIC_* vars are baked in at
# build time, so changing the env var alone does not take effect until the
# next build).
#
# ADMIN_JWT_SECRET is auto-generated by Render (generateValue: true).
# ADMIN_BOOTSTRAP_USERNAME/PASSWORD use sync:false, which prompts for a value
# during blueprint creation -- since this blueprint already exists, add
# these two manually via the new-tounament-backend service's Environment tab
# after the first deploy of this change, then trigger a manual redeploy.
# They're only used once, to create the very first /admin login account
# when admin_users is empty; every admin after that is added from inside the
# dashboard itself, so it's fine to leave them set (or blank them out later).

databases:
  - name: new-tounament-db
    plan: free
    databaseName: tournament
    user: tournament

services:
  - type: web
    name: new-tounament-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: new-tounament-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://new-tounament-frontend.onrender.com
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_BOOTSTRAP_USERNAME
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false

  - type: web
    name: new-tounament-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://new-tounament-backend.onrender.com
